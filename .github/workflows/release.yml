# =====================================================================
# Build & publication de l'image LSTracker sur GitHub Container Registry.
#
# Déclencheurs :
#   - push d'un tag "v*"     → build + push tag versionné + :latest
#   - workflow_dispatch     → build manuel, tag de la branche en cours
#
# L'image est disponible ensuite via :
#   docker pull ghcr.io/<owner>/labsampletracker:2.2.0
# =====================================================================

name: Build & Push Docker image

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/labsampletracker

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write       # nécessaire pour push sur ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Tags générés automatiquement :
          #   v2.2.0    -> :2.2.0, :2.2, :2, :latest
          #   main      -> :main, :sha-<sha>
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=ref,event=branch
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Build seulement amd64 pour serveur Linux x86_64.
          # Ajoute linux/arm64 ici si tu déploies sur Apple Silicon / ARM.
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
