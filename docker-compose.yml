# =====================================================================
# LSTracker — déploiement DEV (local)
# Build à partir du Dockerfile + Postgres officiel.
# Lance : docker compose --env-file .env up -d --build
# (cf. .env.example pour le template des variables)
# =====================================================================

name: lst_dev

networks:
  lst_dev_net:
    driver: bridge

volumes:
  trackerdb_dev:

services:

  # -------------------------------------------------------------------
  # PostgreSQL 14 — dev
  # -------------------------------------------------------------------
  tracker_db:
    image: postgres:14
    container_name: lst_dev_db
    restart: unless-stopped
    networks:
      - lst_dev_net
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
      TZ: ${TZ:-Africa/Abidjan}
    volumes:
      - trackerdb_dev:/var/lib/postgresql/data
      - ./init_db.sql:/docker-entrypoint-initdb.d/01_init_db.sql:ro
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -q -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # -------------------------------------------------------------------
  # App Spring Boot — dev (build local depuis le Dockerfile)
  # -------------------------------------------------------------------
  tracker_app:
    build:
      context: .
    container_name: lst_dev_app
    restart: unless-stopped
    platform: linux/amd64
    networks:
      - lst_dev_net
    depends_on:
      tracker_db:
        condition: service_healthy
    environment:
      TZ: ${TZ:-Africa/Abidjan}
      SERVER_PORT: 9200
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://tracker_db:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      DB_POOL_MAX: ${DB_POOL_MAX:-10}
      DB_POOL_MIN: ${DB_POOL_MIN:-2}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MINUTES: ${JWT_EXPIRATION_MINUTES:-43200}
      JWT_REFRESH_TTL_DAYS: ${JWT_REFRESH_TTL_DAYS:-60}
      JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"
    ports:
      - "${SERVER_PORT:-8050}:9200"
