# =====================================================================
# PostgreSQL 14 — tuning DEMO pour LSTracker
# Cible : 6 GiB RAM allouée au conteneur, 2 cores.
# Profil léger — pas de charge utilisateur soutenue.
# =====================================================================

listen_addresses = '*'
max_connections = 50

# ---- Mémoire (modeste) ----
shared_buffers = 1536MB         # ~25% de 6GB
effective_cache_size = 4GB
work_mem = 16MB
maintenance_work_mem = 256MB
wal_buffers = 8MB

# ---- Checkpoints ----
checkpoint_timeout = 15min
checkpoint_completion_target = 0.9
max_wal_size = 1GB
min_wal_size = 256MB
wal_compression = on

# ---- Planificateur (SSD) ----
random_page_cost = 1.1
effective_io_concurrency = 100
default_statistics_target = 100

# ---- Parallélisme (réduit) ----
max_worker_processes = 4
max_parallel_workers_per_gather = 2
max_parallel_workers = 4

# ---- Logs (verbose pour debug demo) ----
logging_collector = on
log_directory = '/var/lib/postgresql/data/pg_log'
log_filename = 'postgresql-%a.log'
log_rotation_age = 1d
log_min_duration_statement = 500
log_line_prefix = '%t [%p]: db=%d,user=%u,app=%a,client=%h '

autovacuum = on
autovacuum_max_workers = 2
autovacuum_naptime = 60s

timezone = 'Africa/Abidjan'
log_timezone = 'Africa/Abidjan'
password_encryption = scram-sha-256
