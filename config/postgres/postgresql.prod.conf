# =====================================================================
# PostgreSQL 14 — tuning PRODUCTION pour LSTracker
# Cible : 24 GiB RAM allouée au conteneur, 8 cores.
# Référence : https://pgtune.leopard.in.ua/ + ajustements LSTracker.
# =====================================================================

# ---- Réseau ----
listen_addresses = '*'
max_connections = 200        # cohérent avec DB_POOL_MAX (50) × instances

# ---- Mémoire ----
# shared_buffers : ~25% de la RAM allouée
shared_buffers = 6GB
# effective_cache_size : ~50-75% (planner hint)
effective_cache_size = 16GB
# work_mem : mémoire par opération de tri/hash. Attention, multipliée
# par (connexions × opérations concurrentes). 32MB × 200 conns = 6.4GB max.
work_mem = 32MB
# maintenance_work_mem : VACUUM / CREATE INDEX
maintenance_work_mem = 1GB
# wal_buffers : auto si non défini = -1
wal_buffers = 16MB

# ---- Checkpoints / WAL ----
checkpoint_timeout = 15min
checkpoint_completion_target = 0.9
max_wal_size = 4GB
min_wal_size = 1GB
wal_compression = on

# ---- Planificateur (SSD attendu) ----
random_page_cost = 1.1
effective_io_concurrency = 200
default_statistics_target = 100

# ---- Parallélisme ----
max_worker_processes = 8
max_parallel_workers_per_gather = 4
max_parallel_workers = 8
max_parallel_maintenance_workers = 4

# ---- Logs ----
logging_collector = on
log_directory = '/var/lib/postgresql/data/pg_log'
log_filename = 'postgresql-%a.log'
log_rotation_age = 1d
log_rotation_size = 0
log_truncate_on_rotation = on
log_min_duration_statement = 1000   # log queries > 1s (slow query)
log_line_prefix = '%t [%p]: db=%d,user=%u,app=%a,client=%h '
log_lock_waits = on
log_temp_files = 10MB
log_autovacuum_min_duration = 5s

# ---- Autovacuum (table sample peut grossir) ----
autovacuum = on
autovacuum_max_workers = 4
autovacuum_naptime = 30s

# ---- Locale ----
timezone = 'Africa/Abidjan'
log_timezone = 'Africa/Abidjan'

# ---- Sécurité ----
password_encryption = scram-sha-256
