# =====================================================================
# nginx vhost — LSTracker DEMO
# Domaine    : lstracker-demo.itech-civ.org
# Backend    : 127.0.0.1:9201 (container Docker lst_demo_app)
# Cert       : wildcard *.itech-civ.org stocké dans /home/itech/ssl/itech-civ.org/
#
# IMPORTANT — TLS:
#   Pas de CDN devant ce sous-domaine : nginx termine TLS lui-même avec
#   le cert wildcard. Le client parle HTTPS directement au serveur.
#
# Installation :
#   sudo cp lstracker-demo.conf /etc/nginx/sites-available/lstracker-demo.conf
#   sudo ln -sf /etc/nginx/sites-available/lstracker-demo.conf \
#               /etc/nginx/sites-enabled/lstracker-demo.conf
#   sudo nginx -t && sudo systemctl reload nginx
# =====================================================================

# ---------- HTTP → HTTPS ----------
server {
    listen 80;
    listen [::]:80;
    server_name lstracker-demo.itech-civ.org;

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------- HTTPS ----------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name lstracker-demo.itech-civ.org;

    # PLACEHOLDER ▸ adapter aux noms réels des fichiers dans /home/itech/ssl/itech-civ.org/
    # Conventions courantes:
    #   - fullchain.pem ou cert.pem (+ chain) ou .crt
    #   - privkey.pem ou .key
    # Vérifier le contenu réel : ls -la /home/itech/ssl/itech-civ.org/
    ssl_certificate     /home/itech/ssl/itech-civ.org/fullchain.pem;
    ssl_certificate_key /home/itech/ssl/itech-civ.org/privkey.pem;

    # ---- TLS hardening ----
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ---- Security headers ----
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Bandeau visuel "DEMO" — header utilisable côté JS si besoin
    add_header X-Environment "demo" always;

    # ---- Tuning ----
    client_max_body_size 50M;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;

    # ---- Compression ----
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml;

    # ---- Logs ----
    access_log /var/log/nginx/lstracker-demo.access.log;
    error_log  /var/log/nginx/lstracker-demo.error.log warn;

    # ---- CORS (large, comme l'ancien apache2) ----
    if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin  "*";
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, Accept";
        add_header Access-Control-Max-Age       1728000;
        add_header Content-Length 0;
        add_header Content-Type "text/plain charset=UTF-8";
        return 204;
    }

    add_header Access-Control-Allow-Origin  "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, Accept" always;

    # ---- Reverse proxy vers le container DEMO ----
    location / {
        proxy_pass http://127.0.0.1:9201;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Ici nginx termine TLS, donc $scheme = "https" → on le passe à Spring
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 8 16k;
    }

    location /actuator/ {
        allow 127.0.0.1;
        allow ::1;
        deny all;
        proxy_pass http://127.0.0.1:9201;
        proxy_set_header Host $host;
    }
}
