# =====================================================================
# nginx vhost — LSTracker PROD
# Domaine    : lstracker.org (+ www)
# Backend    : 127.0.0.1:8050 (container Docker — historique :
#              sample_tracker_app expose 0.0.0.0:8050 → 9200 interne)
#
# IMPORTANT — TLS:
#   Le cert SSL de lstracker.org est géré par le fournisseur de domaine
#   (CDN/proxy en frontal). nginx écoute donc en HTTP seulement.
#   Le CDN fait : client ⇄ HTTPS ⇄ CDN ⇄ HTTP ⇄ ce serveur.
#
# Installation :
#   sudo cp lstracker-prod.conf /etc/nginx/sites-available/lstracker-prod.conf
#   sudo ln -sf /etc/nginx/sites-available/lstracker-prod.conf \
#               /etc/nginx/sites-enabled/lstracker-prod.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# Si tu déploies un nouveau container prod via docker-compose.prod.yml
# (bind 127.0.0.1:9200), change proxy_pass http://127.0.0.1:8050;
# en proxy_pass http://127.0.0.1:9200; et reload.
# =====================================================================

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name lstracker.org www.lstracker.org;

    # ---- Tuning ----
    client_max_body_size 50M;     # uploads de fichiers, exports Jasper
    proxy_read_timeout 120s;      # rapports Jasper peuvent être longs
    proxy_send_timeout 120s;

    # ---- Compression ----
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml;

    # ---- Logs ----
    access_log /var/log/nginx/lstracker-prod.access.log;
    error_log  /var/log/nginx/lstracker-prod.error.log warn;

    # ---- Reverse proxy vers le container Docker ----
    # NOTE — CORS : sur nginx 1.18 (Ubuntu 22.04), "add_header" et "return"
    # dans un "if" au niveau "server {}" déclenchent "add_header directive
    # is not allowed here". On met donc le bloc dans "location /" où c'est
    # autorisé. CORS large (équivalent à l'ancien apache2).
    location / {
        # Pre-flight OPTIONS : court-circuiter avant le proxy vers Spring.
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  "*";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, Accept";
            add_header Access-Control-Max-Age       1728000;
            add_header Content-Length               0;
            add_header Content-Type                 "text/plain charset=UTF-8";
            return 204;
        }

        # CORS sur les réponses applicatives
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, Accept" always;

        # Container prod actuel : sample_tracker_app sur 0.0.0.0:8050.
        # nginx peut l'atteindre via 127.0.0.1:8050.
        proxy_pass http://127.0.0.1:8050;
        proxy_http_version 1.1;

        # Headers standards reverse proxy
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

        # IMPORTANT — schéma vu par le client :
        # Le CDN ajoute X-Forwarded-Proto: https quand le client est en HTTPS.
        # On le re-propage tel quel à Spring (ne PAS forcer "http" comme dans
        # l'ancienne config apache2, sinon Spring génère des liens http://).
        # $http_x_forwarded_proto récupère le header envoyé par le CDN ; s'il
        # est vide (appel direct au serveur), on utilise $scheme (= http ici).
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $http_x_forwarded_port;

        # WebSocket support (au cas où — pas utilisé actuellement)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Buffers raisonnables pour Spring Boot
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 8 16k;
    }

    # ---- Bloque l'accès direct à /actuator depuis l'extérieur ----
    # Healthcheck reste accessible localement.
    location /actuator/ {
        # Allowlist : seul l'host peut consulter
        allow 127.0.0.1;
        allow ::1;
        deny all;

        proxy_pass http://127.0.0.1:8050;
        proxy_set_header Host $host;
    }
}
