spring.application.name=labSampleTracker

# Charge automatiquement un fichier .env à la racine du projet (dev local).
# - "optional:" : pas d'erreur si le fichier n'existe pas (cas prod où les
#   vars viennent du compose)
# - "file:.env[.properties]" : Spring lit .env comme un fichier .properties
#   (format KEY=value compatible avec Docker Compose et standard dotenv).
spring.config.import=optional:file:.env[.properties]

spring.datasource.driver=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.PostgreSQLDialect
# Connexion DB :
#   - En dev local : variables lues depuis .env (POSTGRES_USER / POSTGRES_PASSWORD)
#   - En prod/demo : les compose injectent directement SPRING_DATASOURCE_*
#     qui override ces propriétés.
# Le default sur l'URL pointe vers la DB locale (port 5435, schéma sample_tracker).
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5435/${POSTGRES_DB:sample_tracker}?currentSchema=sample_tracker}
spring.datasource.username=${POSTGRES_USER:appuser}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Hibernate batching to mitigate N+1 on lazy collections (overrides per-collection @BatchSize possible)
spring.jpa.properties.hibernate.default_batch_fetch_size=50
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# HikariCP tuning (50-500 users target)
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:30}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN:5}
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.leak-detection-threshold=30000

# HTTP compression
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/css,text/javascript,application/javascript
server.compression.min-response-size=2048

logging.file.name=../tracker-app.log
# Structured logging pattern with MDC (requestId, user)
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] [reqId=%X{requestId:-} user=%X{user:-}] %logger{40} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] [reqId=%X{requestId:-} user=%X{user:-}] %logger{40} - %msg%n
logging.level.org.itech.labSampleTracker=INFO

#=============================
#liquibase
#=============================
spring.liquibase.change-log=classpath:/db/changelog/master.xml
logging.level.liquibase = INFO

# JWT — no fallback : the app refuses to start if JWT_SECRET is not set.
# Format MUST be base64 (JwtService uses Decoders.BASE64.decode()).
# Generate with: openssl rand -base64 64 | tr -d '\n'
app.jwt.secret=${JWT_SECRET}
app.jwt.issuer=${JWT_ISSUER:ls-tracker}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:43200}
app.jwt.refresh-ttl-days=${JWT_REFRESH_TTL_DAYS:60}

# Intégration oedatarepo (OpenELIS consolidé) — récupération du statut/dates
# d'analyse par labno. Désactivé par défaut : à activer + configurer par env
# (le serveur cible diffère selon demo/prod).
lstracker.oedatarepo.enabled=${OEDATAREPO_ENABLED:false}
lstracker.oedatarepo.base-url=${OEDATAREPO_URL:}
lstracker.oedatarepo.username=${OEDATAREPO_USER:}
lstracker.oedatarepo.password=${OEDATAREPO_PASSWORD:}
# Réglages du job de synchronisation (visibles/ajustables par env) :
#   batch-size      : nb max d'échantillons traités par passage
#   interval-ms     : délai entre deux passages (30 min par défaut)
#   max-attempts    : nb d'échecs NOT_FOUND avant exclusion d'un labno des
#                     passages automatiques (réintroduit par reset admin)
lstracker.oedatarepo.sync.batch-size=${OEDATAREPO_BATCH_SIZE:200}
lstracker.oedatarepo.sync.interval-ms=${OEDATAREPO_INTERVAL_MS:1800000}
lstracker.oedatarepo.sync.initial-delay-ms=${OEDATAREPO_INITIAL_DELAY_MS:60000}
lstracker.oedatarepo.sync.max-attempts=${OEDATAREPO_MAX_ATTEMPTS:5}


# Désactive le Docker Compose support de Spring Boot 3.1+.
# Sinon, `mvn spring-boot:run` détecte docker-compose.yml du projet et
# essaie de pull/start les containers — ce qu'on ne veut PAS :
#   - en dev local, on a déjà sa propre DB Postgres qui tourne
#   - en prod, l'app tourne DANS un container, ce support n'est pas chargé
spring.docker.compose.enabled=false

# Jackson : sérialiser LocalDate / LocalDateTime en ISO 8601 string
# (ex: "2026-05-27") au lieu de tableau d'entiers [2026, 5, 27].
# Sans cette ligne, les DTOs avec LocalDate génèrent du JSON incompatible
# avec les clients JS qui attendent une string parseable.
spring.jackson.serialization.write-dates-as-timestamps=false

server.port=${SERVER_PORT:9200}
server.error.include-message=always
server.error.include-binding-errors=never
# Behind nginx/Traefik : trust X-Forwarded-* headers to detect HTTPS and host.
# Without this, Spring generates http:// URLs even when client accesses via https://.
server.forward-headers-strategy=NATIVE
app.version=@project.version@

# Actuator : expose uniquement /health pour healthchecks Docker/load balancer.
# Pas de details sensibles (composants DB, disk space) en mode anonyme.
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true
