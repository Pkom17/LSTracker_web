<!DOCTYPE html>
<html lang="fr" xmlns="http://www.w3.org/1999/xhtml"
	xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">

<head th:replace="~{fragments/header :: head}">
<title>Modifier le laboratoire</title>
</head>

<body class="sb-nav-fixed">

<style>
.form-wrap { max-width: 900px; margin: 0 auto; padding-bottom: 5rem; }
.form-header {
	display: flex; flex-wrap: wrap; gap: 1rem; align-items: center;
	padding: 1rem 1.25rem; background: #fff;
	border: 1px solid #e6e9f3; border-radius: .75rem;
	margin-bottom: 1rem; box-shadow: 0 1px 3px rgba(0,0,0,.03);
}
.form-header h1 { font-size: 1.05rem; margin: 0; color: #1f2937; font-weight: 600; }
.form-header h1 i { color: #4f46e5; margin-right: .35rem; }
.form-header .meta { font-size: .75rem; color: #6b7280; margin-top: .15rem; }

.section-card {
	background: #fff; border: 1px solid #e6e9f3; border-radius: .75rem;
	margin-bottom: 1rem; box-shadow: 0 1px 3px rgba(0,0,0,.03);
}
.section-card .section-header {
	padding: .75rem 1.25rem; border-bottom: 1px solid #e6e9f3;
	background: #f8fafc; border-radius: .75rem .75rem 0 0;
}
.section-card .section-header h2 { font-size: .95rem; margin: 0; color: #1f2937; font-weight: 600; }
.section-card .section-header h2 i { color: #4f46e5; margin-right: .35rem; }
.section-card .section-body { padding: 1.25rem; }

.field { margin-bottom: .75rem; }
.field label {
	display: block; font-size: .72rem; text-transform: uppercase;
	font-weight: 600; color: #6b7280; letter-spacing: .03em; margin-bottom: .25rem;
}
.field label .req { color: #dc2626; }
.field .hint { display: block; font-size: .7rem; color: #9ca3af; margin-top: .15rem; }

.save-bar {
	background: #f8fafc;
	border-top: 1px solid #e6e9f3;
	padding: .85rem 1.25rem;
	margin-top: .5rem;
	border-radius: .5rem;
	display: flex;
	justify-content: flex-end;
	gap: .5rem;
}

.select2-container--default .select2-selection--single {
	height: calc(1.5em + .75rem + 2px) !important;
	display: flex !important; align-items: center !important;
}
</style>

	<div class="d-flex" id="wrapper">
		<div id="page-content-wrapper">

			<div th:insert="~{fragments/header :: header(content='Modifier le laboratoire', module='lab')}"></div>

			<div class="container-fluid py-3 form-wrap">

				<div class="form-header">
					<div>
						<h1><i class="fas fa-flask"></i>Modifier le laboratoire</h1>
						<div class="meta">
							ID : <strong th:text="${lab?.id}">—</strong>
							<span th:if="${lab?.createdAt}">
								· Créé le <strong th:text="${#dates.format(lab.createdAt, 'dd/MM/yyyy HH:mm')}">—</strong>
							</span>
						</div>
					</div>
					<div class="ms-auto">
						<a th:href="@{/lab}" class="btn btn-sm btn-outline-secondary">
							<i class="fas fa-arrow-left me-1"></i> Retour à la liste
						</a>
						<a th:href="@{'/lab/delete/' + ${lab?.id}}"
							class="btn btn-sm btn-outline-danger ms-2"
							onclick="return confirm('Voulez-vous vraiment supprimer ce laboratoire ?');">
							<i class="fas fa-trash-alt me-1"></i> Supprimer
						</a>
					</div>
				</div>

				<div th:if="${message_error != null}" class="alert alert-danger" th:text="${message_error}"></div>
				<div th:if="${message_success != null}" class="alert alert-success" th:text="${message_success}"></div>

				<form th:object="${lab}" th:action="@{'/lab/update/'+${lab?.id}}" method="post" id="labForm">
					<input type="hidden" th:field="*{id}"/>

					<div class="section-card">
						<div class="section-header"><h2><i class="fas fa-id-card"></i> Identité</h2></div>
						<div class="section-body">
							<div class="row">
								<div class="col-md-8 field">
									<label for="inputLabName">Nom du laboratoire <span class="req">*</span></label>
									<input th:field="*{labName}" type="text" id="inputLabName"
										class="form-control form-control-sm" maxlength="100" required/>
								</div>
								<div class="col-md-4 field">
									<label for="selectLabType">Type de labo <span class="req">*</span></label>
									<select class="form-select form-select-sm select2"
										th:field="*{labType}" id="selectLabType" required>
										<option value=""></option>
										<option th:each="t : ${labTypes}"
											th:value="${t.type}" th:text="${t.type}"></option>
									</select>
								</div>
							</div>
							<div class="row">
								<div class="col-md-6 field">
									<div class="form-check mt-2">
										<input class="form-check-input" type="checkbox"
											th:field="*{isActive}" id="checkIsActive"/>
										<label class="form-check-label" for="checkIsActive"
											style="text-transform:none; font-weight:500; color:#374151; letter-spacing:normal;">
											Laboratoire actif
										</label>
									</div>
								</div>
							</div>
						</div>
					</div>

					<div class="section-card">
						<div class="section-header"><h2><i class="fas fa-address-book"></i> Contact</h2></div>
						<div class="section-body">
							<div class="row">
								<div class="col-md-6 field">
									<label for="inputLabPhone">Téléphone</label>
									<input th:field="*{labPhone}" type="text" id="inputLabPhone"
										class="form-control form-control-sm" maxlength="50"/>
								</div>
								<div class="col-md-6 field">
									<label for="inputLabMail">Email</label>
									<input th:field="*{labMail}" type="email" id="inputLabMail"
										class="form-control form-control-sm" maxlength="50"/>
								</div>
							</div>
						</div>
					</div>

					<div class="section-card">
						<div class="section-header"><h2><i class="fas fa-map-marker-alt"></i> Localisation</h2></div>
						<div class="section-body">
							<div class="row">
								<div class="col-md-12 field">
									<label for="selectDistrict">District <span class="req">*</span></label>
									<select class="form-select form-select-sm select2"
										th:field="*{districtId}" id="selectDistrict" required>
										<option value=""></option>
										<option th:each="item : ${districts}"
											th:value="${item.id}" th:text="${item.name}"></option>
									</select>
								</div>
							</div>
							<div class="row">
								<div class="col-md-6 field">
									<label for="inputLatitude">Latitude</label>
									<input th:field="*{latitude}" type="number" step="0.0000001"
										id="inputLatitude" class="form-control form-control-sm"/>
								</div>
								<div class="col-md-6 field">
									<label for="inputLongitude">Longitude</label>
									<input th:field="*{longitude}" type="number" step="0.0000001"
										id="inputLongitude" class="form-control form-control-sm"/>
								</div>
							</div>
						</div>
					</div>

				</form>

				<div class="save-bar">
		<a th:href="@{/lab}" class="btn btn-outline-secondary">Annuler</a>
		<button type="submit" form="labForm" class="btn btn-primary">
			<i class="fas fa-save"></i> Enregistrer les modifications
		</button>
	</div>

			</div>
		</div>
	</div>
	<footer class="py-4 bg-light mt-auto" th:insert="~{fragments/footer :: footer}"></footer>

	<script th:src="@{/webjars/jquery/3.6.0/jquery.min.js}"></script>
	<script th:src="@{/webjars/bootstrap/5.1.3/js/bootstrap.bundle.min.js}"></script>
	<script th:src="@{/webjars/font-awesome/5.15.4/js/all.js}"></script>
	<script th:src="@{/webjars/select2/4.0.13/js/select2.min.js}"></script>

	<script>
	$(function() {
		$('.select2').select2({ width: '100%', allowClear: true, placeholder: '— Sélectionner —' });
		$(document).on('select2:open', function() {
			const el = document.querySelector('.select2-search__field');
			if (el) el.focus();
		});
	});
	</script>

</body>
</html>
