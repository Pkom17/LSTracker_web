<!DOCTYPE html>
<html lang="fr" xmlns="http://www.w3.org/1999/xhtml"
	xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">

<head th:replace="~{fragments/header :: head}">
<title>Gestion des laboratoires</title>
</head>

<body class="sb-nav-fixed">

<style>
.admin-layout {
	display: grid;
	grid-template-columns: 300px 1fr;
	gap: 1rem;
	align-items: start;
}
@media (max-width: 992px) {
	.admin-layout { grid-template-columns: 1fr; }
	.admin-sidebar { position: static !important; max-height: none !important; }
}

.admin-sidebar {
	position: sticky;
	top: 70px;
	max-height: calc(100vh - 90px);
	overflow-y: auto;
	border: 1px solid #e6e9f3;
	border-radius: .75rem;
	background: #fff;
}
.admin-sidebar .sidebar-header {
	background: #f8fafc;
	border-bottom: 1px solid #e6e9f3;
	padding: .75rem 1rem;
	border-radius: .75rem .75rem 0 0;
	display: flex;
	align-items: center;
	justify-content: space-between;
}
.admin-sidebar .sidebar-body { padding: 1rem; }
.admin-sidebar .filter-group { margin-bottom: 1rem; }
.admin-sidebar .filter-group > label.form-label {
	font-size: .72rem;
	text-transform: uppercase;
	font-weight: 600;
	color: #6b7280;
	letter-spacing: .03em;
	margin-bottom: .35rem;
}

.toggle-row {
	display: flex; align-items: center; justify-content: space-between;
	padding: .3rem 0;
}
.toggle-row span { font-size: .85rem; color: #374151; }

.admin-toolbar {
	display: flex; gap: .5rem; flex-wrap: wrap; align-items: stretch;
	margin-bottom: .5rem; padding: .5rem .75rem;
	border: 1px solid #e6e9f3; border-radius: .5rem; background: #fff;
}
.admin-toolbar > .toolbar-item { display: flex; align-items: center; }
.search-input { max-width: 320px; flex: 1 1 220px; }
.search-input .form-control-sm { height: calc(1.5em + .5rem + 2px); }

.input-icon { position: relative; }
.input-icon i { position: absolute; left: .55rem; top: 50%; transform: translateY(-50%); color: #9ca3af; }
.input-icon input { padding-left: 1.75rem; }

.code-pill {
	display: inline-block;
	font-family: monospace;
	font-size: .72rem;
	font-weight: 600;
	padding: .15rem .5rem;
	border-radius: .25rem;
	background: #f1f5f9;
	color: #1e293b;
}

/* Pills par type de labo */
.lab-pill {
	display: inline-block;
	font-size: .7rem;
	font-weight: 600;
	padding: .15rem .55rem;
	border-radius: .25rem;
	white-space: nowrap;
}
.lp-plateform { background: #ede9fe; color: #5b21b6; }
.lp-tb        { background: #ffedd5; color: #9a3412; }
.lp-district  { background: #dbeafe; color: #1e40af; }
.lp-hub       { background: #dcfce7; color: #166534; }
.lp-default   { background: #f1f5f9; color: #1e293b; }

/* Status badge */
.badge-status {
	display: inline-block;
	font-size: .7rem;
	font-weight: 600;
	padding: .15rem .55rem;
	border-radius: 1rem;
	white-space: nowrap;
}
.b-active { background: #e9f7ef; color: #167b3a; }
.b-inactive { background: #f3f4f6; color: #6b7280; }

/* Contact (2 lignes) */
.contact-stack { display: flex; flex-direction: column; line-height: 1.2; }
.contact-stack .phone { font-size: .8rem; color: #1f2937; }
.contact-stack .mail  { font-size: .72rem; color: #6b7280; }

.row-actions { display: flex; gap: .15rem; }
.row-actions .btn-action {
	border: 1px solid #d1d5db;
	background: #fff;
	color: #374151;
	font-size: .8rem;
	padding: .15rem .45rem;
	border-radius: .25rem;
	cursor: pointer;
	line-height: 1;
	text-decoration: none;
}
.row-actions .btn-action:hover { background: #f3f4f6; }
.row-actions .btn-action.btn-warning-soft { color: #b45309; }
.row-actions .btn-action.btn-danger-soft { color: #dc2626; }

table#tab_labs thead th {
	background: #f8fafc;
	border-bottom: 2px solid #e6e9f3;
	font-size: .8rem;
	white-space: nowrap;
}
table#tab_labs tbody td {
	vertical-align: middle;
	font-size: .85rem;
}
table#tab_labs tbody tr:hover { background: #fafcff; }

.empty-cell { color: #9ca3af; font-style: italic; }
.coords {
	font-family: monospace;
	font-size: .75rem;
	color: #475569;
}
</style>

	<div class="d-flex" id="wrapper">
		<div id="page-content-wrapper">

			<div th:insert="~{fragments/header :: header(content='Gestion des laboratoires', module='lab')}"></div>

			<div class="container-fluid py-3">

				<div class="admin-layout">

					<!-- ============ SIDEBAR FILTRES ============ -->
					<aside class="admin-sidebar">
						<div class="sidebar-header">
							<div class="d-flex align-items-center gap-2">
								<i class="fas fa-filter text-primary"></i>
								<strong>Filtres</strong>
							</div>
							<button class="btn btn-sm btn-link p-0 text-decoration-none" id="btnResetAll" type="button">
								<i class="fas fa-times-circle"></i> Effacer
							</button>
						</div>

						<div class="sidebar-body">
							<div class="filter-group">
								<label class="form-label" for="searchText">Recherche</label>
								<div class="input-icon">
									<i class="fas fa-search"></i>
									<input type="search" id="searchText" class="form-control form-control-sm"
										placeholder="nom labo, téléphone, mail, district..." autocomplete="off"/>
								</div>
							</div>

							<div class="filter-group">
								<label class="form-label" for="filter_region">Région</label>
								<select class="form-select form-select-sm select2-single" id="filter_region">
									<option value=""></option>
									<option th:each="r : ${regions}" th:value="${r.id}" th:text="${r.name}"></option>
								</select>
							</div>

							<div class="filter-group">
								<label class="form-label" for="filter_district">District</label>
								<select class="form-select form-select-sm select2-single" id="filter_district">
									<option value=""></option>
									<option th:each="d : ${districts}" th:value="${d.id}" th:text="${d.name}"></option>
								</select>
							</div>

							<div class="filter-group">
								<label class="form-label" for="filter_lab_type">Type de labo (multi)</label>
								<select class="form-select form-select-sm select2-multi" id="filter_lab_type" multiple>
									<option th:each="t : ${labTypes}" th:value="${t.type}" th:text="${t.type}"></option>
								</select>
							</div>

							<div class="filter-group">
								<label class="form-label" for="toggleActive">Statut</label>
								<div class="toggle-row">
									<span><i class="fas fa-check-circle text-success me-1"></i>Actifs uniquement</span>
									<div class="form-check form-switch">
										<input class="form-check-input" type="checkbox" id="toggleActive"/>
									</div>
								</div>
								<div class="toggle-row">
									<span><i class="fas fa-times-circle text-secondary me-1"></i>Inactifs uniquement</span>
									<div class="form-check form-switch">
										<input class="form-check-input" type="checkbox" id="toggleInactive"/>
									</div>
								</div>
							</div>
						</div>
					</aside>

					<!-- ============ MAIN ============ -->
					<main>
						<div class="admin-toolbar">
							<div class="toolbar-item input-icon search-input">
								<i class="fas fa-search"></i>
								<input type="search" id="quickSearch" class="form-control form-control-sm"
									placeholder="Recherche rapide..." autocomplete="off"/>
							</div>

							<div class="toolbar-item ms-auto gap-2">
								<a class="btn btn-sm btn-primary me-2" th:href="@{/lab/new}">
									<i class="fas fa-plus me-1"></i> Nouveau laboratoire
								</a>
								<button class="btn btn-sm btn-outline-secondary" id="btnReload" type="button" title="Rafraîchir">
									<i class="fas fa-sync"></i>
								</button>
							</div>
						</div>

						<div class="card shadow-sm">
							<div class="card-body p-2">
								<table id="tab_labs" class="table table-sm table-hover table-striped align-middle" style="width:100%">
									<thead>
										<tr>
											<th style="width:50px;">#</th>
											<th>Région</th>
											<th>District</th>
											<th>Nom du labo</th>
											<th>Type</th>
											<th>Contact</th>
											<th>Coordonnées</th>
											<th>Statut</th>
											<th>Actions</th>
										</tr>
									</thead>
								</table>
							</div>
						</div>
					</main>
				</div>
			</div>
		</div>
	</div>

	<footer class="py-4 bg-light mt-auto" th:insert="~{fragments/footer :: footer}"></footer>

	<script th:src="@{/webjars/jquery/3.6.0/jquery.min.js}"></script>
	<script th:src="@{/webjars/bootstrap/5.1.3/js/bootstrap.bundle.min.js}"></script>
	<script th:src="@{/webjars/font-awesome/5.15.4/js/all.js}"></script>
	<script th:src="@{/webjars/select2/4.0.13/js/select2.min.js}"></script>
	<script th:src="@{/DataTables/datatables.min.js}"></script>

	<script th:inline="none">
	$(function () {
		$('.select2-single').select2({ width: '100%', allowClear: true, placeholder: '— Tous —' });
		$('.select2-multi').select2({ width: '100%', allowClear: true, placeholder: '— Sélectionner —' });

		// Cascade Région → District
		$('#filter_region').on('change', function() {
			const r = $(this).val();
			if (!r) return;
			$.get('district/names_by_regions?regions=' + r, function(districts) {
				const $d = $('#filter_district');
				$d.empty().append('<option value=""></option>');
				$.each(districts, (i, d) => $d.append('<option value="' + d.id + '">' + d.name + '</option>'));
				$d.val(null).trigger('change');
			});
		});

		// Mutually exclusive Active/Inactive toggles
		$('#toggleActive').on('change', function() {
			if (this.checked) $('#toggleInactive').prop('checked', false);
			reload();
		});
		$('#toggleInactive').on('change', function() {
			if (this.checked) $('#toggleActive').prop('checked', false);
			reload();
		});

		const table = $('#tab_labs').DataTable({
			processing: true,
			serverSide: true,
			ordering: false,
			ajax: {
				url: 'lab/data',
				data: function(d) {
					d.search_text = $('#searchText').val() || $('#quickSearch').val() || null;
					d.region = $('#filter_region').val() || null;
					d.district = $('#filter_district').val() || null;
					const types = $('#filter_lab_type').val() || [];
					if (types.length) d.lab_type = types;
					if ($('#toggleActive').is(':checked')) d.active = true;
					else if ($('#toggleInactive').is(':checked')) d.active = false;
				},
				dataSrc: 'data',
				traditional: true
			},
			columns: [
				{
					data: null, orderable: false, searchable: false,
					className: 'text-center text-muted',
					render: function (data, type, row, meta) {
						return meta.row + meta.settings._iDisplayStart + 1;
					}
				},
				{ data: 'region', render: renderText },
				{ data: 'district', render: renderText },
				{ data: 'lab_name', render: renderText },
				{ data: 'lab_type', render: renderLabType },
				{ data: null, render: renderContact, orderable: false },
				{ data: null, render: renderCoords, orderable: false },
				{ data: null, render: renderStatus, orderable: false },
				{ data: 'id', render: renderActions, orderable: false }
			],
			pageLength: 25,
			lengthMenu: [10, 25, 50, 100],
			dom: '<"row align-items-center mb-2"<"col-md-6"l><"col-md-6 text-end"i>>rtp',
			language: {
				processing: '<i class="fas fa-spinner fa-spin"></i> Chargement...',
				lengthMenu: 'Afficher _MENU_',
				info: '_START_–_END_ sur _TOTAL_',
				infoEmpty: 'Aucun laboratoire',
				zeroRecords: 'Aucun laboratoire trouvé',
				emptyTable: 'Aucun laboratoire',
				paginate: { first: '«', last: '»', next: '›', previous: '‹' }
			}
		});

		function reload() { table.ajax.reload(); }
		const debouncedReload = debounce(reload, 300);
		$('#filter_region, #filter_district, #filter_lab_type').on('change', reload);
		$('#searchText, #quickSearch').on('input', debouncedReload);
		$('#btnReload').on('click', reload);
		$('#btnResetAll').on('click', function() {
			$('#searchText, #quickSearch').val('');
			$('#filter_region, #filter_district, #filter_lab_type').val(null).trigger('change.select2');
			$('#toggleActive, #toggleInactive').prop('checked', false);
			reload();
		});
	});

	function renderText(data) {
		return data ? escapeHtml(data) : '<span class="empty-cell">—</span>';
	}
	function renderLabType(data) {
		if (!data) return '<span class="empty-cell">—</span>';
		const t = String(data).toUpperCase();
		let cls = 'lp-default';
		if (t.includes('PLATEFORM')) cls = 'lp-plateform';
		else if (t.includes('TB'))   cls = 'lp-tb';
		else if (t.includes('DISTRICT')) cls = 'lp-district';
		else if (t.includes('HUB'))  cls = 'lp-hub';
		return '<span class="lab-pill ' + cls + '">' + escapeHtml(data) + '</span>';
	}
	function renderContact(data, type, row) {
		const phone = row.lab_phone;
		const mail  = row.lab_mail;
		if (!phone && !mail) return '<span class="empty-cell">—</span>';
		let html = '<div class="contact-stack">';
		if (phone) html += '<span class="phone"><i class="fas fa-phone-alt text-muted me-1"></i>' + escapeHtml(phone) + '</span>';
		if (mail)  html += '<span class="mail"><i class="fas fa-envelope text-muted me-1"></i>' + escapeHtml(mail) + '</span>';
		html += '</div>';
		return html;
	}
	function renderCoords(data, type, row) {
		if (row.longitude == null && row.latitude == null) {
			return '<span class="empty-cell">—</span>';
		}
		return '<span class="coords">' + (row.latitude ?? '?') + ', ' + (row.longitude ?? '?') + '</span>';
	}
	function renderStatus(data, type, row) {
		if (row.is_active) {
			return '<span class="badge-status b-active"><i class="fas fa-check-circle"></i> Actif</span>';
		}
		return '<span class="badge-status b-inactive"><i class="fas fa-times-circle"></i> Inactif</span>';
	}
	function renderActions(data, type, row) {
		const id = row.id;
		return ''
			+ '<div class="row-actions">'
			+   '<a class="btn-action btn-warning-soft" title="Modifier" href="lab/update/' + id + '"><i class="fas fa-pencil-alt"></i></a>'
			+   '<a class="btn-action btn-danger-soft" title="Supprimer" href="lab/delete/' + id + '" onclick="return confirm(\'Supprimer ce laboratoire ?\')"><i class="fas fa-trash-alt"></i></a>'
			+ '</div>';
	}

	function debounce(fn, ms) {
		let t;
		return function() {
			const args = arguments, ctx = this;
			clearTimeout(t);
			t = setTimeout(() => fn.apply(ctx, args), ms);
		};
	}
	function escapeHtml(str) {
		if (str == null) return '';
		return String(str).replace(/[&<>"']/g, function(c) {
			return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
		});
	}
	</script>

</body>
</html>
