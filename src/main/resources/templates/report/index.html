<!doctype html>
<html
  lang="fr"
  xmlns="http://www.w3.org/1999/xhtml"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity5"
>
  <head th:replace="~{fragments/header :: head}">
    <title>Rapports d’activité</title>

    <style>
      .page-section {
        padding-top: 0.75rem;
        padding-bottom: 1rem;
      }

      /* Cartes */
      .card-slab {
        border: 1px solid #e6e9f3;
        border-radius: 1rem;
      }

      .card-slab .card-header {
        background: #f8fafc;
        border-bottom: 1px solid #e6e9f3;
      }

      .hint {
        font-size: 0.85rem;
        color: #6b7280;
      }

      /* Select2 : bordures visibles + hauteur sm */
      .select2-container--default .select2-selection--single {
        border: 1px solid #ced4da !important;
        border-radius: 0.25rem !important;
        background-color: #fff !important;
        height: calc(1.5em + 0.5rem + 2px) !important; /* ≈ .form-select-sm */
        display: flex !important;
        align-items: center !important;
      }

      .select2-container--default
        .select2-selection--single
        .select2-selection__rendered {
        padding-left: 0.5rem !important;
        padding-right: 1.5rem !important;
        line-height: 1.5 !important;
        font-size: 0.875rem !important;
        color: #212529 !important;
      }

      .select2-container--default
        .select2-selection--single
        .select2-selection__arrow {
        height: 100% !important;
        top: 50% !important;
        transform: translateY(-50%) !important;
        right: 0.5rem !important;
        position: absolute !important;
      }

      /* État désactivé visuel de la ligne (exclusivité) */
      .scope-disabled {
        opacity: 0.6;
        pointer-events: none;
      }
    </style>
  </head>

  <body class="sb-nav-fixed">
    <div class="d-flex" id="wrapper">
      <div id="page-content-wrapper">
        <div
          th:insert="~{fragments/header :: header(content='Rapports', module='report')}"
        ></div>

        <div class="container-fluid page-section">
          <!-- ==================== ZONE 1 : PÉRIODE ==================== -->
          <div class="card card-slab shadow-sm mb-3">
            <div
              class="card-header py-2 d-flex align-items-center justify-content-between"
            >
              <div class="d-flex align-items-center gap-2">
                <i class="fas fa-calendar-alt text-primary"></i>
                <strong>Période</strong>
              </div>
              <small class="hint">Sélectionnez la période du rapport</small>
            </div>
            <div class="card-body py-3">
              <div class="row g-3">
                <div class="col-12 col-md-4">
                  <label class="form-label mb-1" for="input_start_date"
                    >Du</label
                  >
                  <input
                    th:value="${selectedStartDate}"
                    type="text"
                    class="form-control form-control-sm"
                    id="input_start_date"
                    placeholder="Date début"
                    autocomplete="off"
                  />
                </div>
                <div class="col-12 col-md-4">
                  <label class="form-label mb-1" for="input_end_date">Au</label>
                  <input
                    th:value="${selectedEndDate}"
                    type="text"
                    class="form-control form-control-sm"
                    id="input_end_date"
                    placeholder="Date de fin"
                    autocomplete="off"
                  />
                </div>
              </div>
            </div>
          </div>

          <!-- ==================== ZONE 2 : SÉLECTIONS EXCLUSIVES ==================== -->
          <div class="card card-slab shadow-sm mb-3">
            <div class="card-header py-2">
              <strong>Choix du périmètre (sélections exclusives)</strong>
              <div class="hint">
                Vous pouvez générer un rapport par <em>Région, District</em>,
                par <em>Laboratoire</em>, ou par <em>Convoyeur</em>. Choisir une
                ligne désactive les autres.
              </div>
            </div>
            <div class="card-body py-3">
              <div class="row g-3">
                <!-- LIGNE A : Région → District → Site (cascade) -->
                <div class="col-12" id="scope-area">
                  <label class="form-label mb-1 d-block"
                    >Par Région / District
                  </label>
                  <div class="row g-3">
                    <div class="col-12 col-md-4">
                      <label class="form-label mb-1" for="selectRegion"
                        >Région</label
                      >
                      <select
                        class="form-select form-select-sm select2 scope-input"
                        id="selectRegion"
                      >
                        <option value=""></option>
                        <option
                          th:each="r : ${regions}"
                          th:value="${r.id}"
                          th:text="${r.name}"
                          th:selected="${r.id == selectedRegion}"
                        ></option>
                      </select>
                    </div>
                    <div class="col-12 col-md-4">
                      <label class="form-label mb-1" for="selectDistrict"
                        >District</label
                      >
                      <select
                        class="form-select form-select-sm select2 scope-input"
                        id="selectDistrict"
                      >
                        <option value=""></option>
                        <option
                          th:each="d : ${districts}"
                          th:value="${d.id}"
                          th:text="${d.name}"
                          th:selected="${d.id == selectedDistrict}"
                        ></option>
                      </select>
                    </div>
                    <!-- 									<div class="col-12 col-md-4"> -->
                    <!-- 										<label class="form-label mb-1" for="selectSite">Site</label> <select -->
                    <!-- 											class="form-select form-select-sm select2 scope-input" -->
                    <!-- 											id="selectSite"> -->
                    <!-- 											<option value=""></option> -->
                    <!-- 											<option th:each="s : ${sites}" th:value="${s.id}" -->
                    <!-- 												th:text="${s.name}" th:selected="${s.id == selectedSite}"></option> -->
                    <!-- 										</select> -->
                    <!-- 									</div> -->
                  </div>
                </div>

                <!-- LIGNE B : Laboratoire -->
                <div class="col-12" id="scope-lab">
                  <div class="col-12 col-md-4">
                    <label class="form-label mb-1" for="selectLab"
                      >Par Laboratoire</label
                    >
                    <select
                      class="form-select form-select-sm select2 scope-input"
                      id="selectLab"
                    >
                      <option value=""></option>
                      <option
                        th:each="l : ${labs}"
                        th:value="${l.id}"
                        th:text="${l.name}"
                        th:selected="${l.id == selectedLab}"
                      ></option>
                    </select>
                  </div>
                </div>

                <!-- LIGNE C : Convoyeur -->
                <div class="col-12" id="scope-rider">
                  <div class="col-12 col-md-4">
                    <label class="form-label mb-1" for="selectRider"
                      >Par Convoyeur</label
                    >
                    <select
                      class="form-select form-select-sm select2 scope-input"
                      id="selectRider"
                    >
                      <option value=""></option>
                      <option
                        th:each="rider : ${riders}"
                        th:value="${rider.id}"
                        th:text="${rider.name}"
                        th:selected="${rider.id == selectedRider}"
                      ></option>
                    </select>
                  </div>
                </div>
              </div>

              <!-- Bouton imprimer -->
              <div class="d-flex justify-content-end mt-3">
                <a
                  id="printActivityReport"
                  class="btn btn-primary"
                  target="_blank"
                  href="#"
                  title="Imprimer le rapport d’activité (PDF)"
                >
                  <i class="fas fa-file-pdf me-2"></i> Imprimer le rapport
                  d’activité
                </a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <footer
      class="py-4 bg-light mt-auto"
      th:insert="~{fragments/footer :: footer}"
    ></footer>

    <!-- Scripts -->
    <script th:src="@{/webjars/jquery/3.6.0/jquery.min.js}"></script>
    <script th:src="@{/webjars/jquery-ui/1.13.2/jquery-ui.min.js}"></script>
    <script
      th:src="@{/webjars/bootstrap/5.1.3/js/bootstrap.bundle.min.js}"
    ></script>
    <script th:src="@{/webjars/font-awesome/5.15.4/js/all.js}"></script>
    <script th:src="@{/webjars/select2/4.0.13/js/select2.min.js}"></script>
    <script th:src="@{/DataTables/datatables.min.js}"></script>
    <script th:src="@{/js/scripts.js}"></script>

    <script>
      // ----- Datepickers -----
      const dateFormat = "dd/mm/yy";
      $("#input_start_date").datepicker({
        changeMonth: true,
        changeYear: true,
        dateFormat,
      });
      $("#input_end_date").datepicker({
        changeMonth: true,
        changeYear: true,
        dateFormat,
      });

      // Si Thymeleaf injecte yyyy-MM-dd, les reformater visuellement en dd/mm/yy
      (function normalizeDateInputs() {
        function isoToUI(iso) {
          if (!iso) return "";
          const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(iso);
          if (!m) return iso;
          return `${m[3]}/${m[2]}/${m[1]}`;
        }
        const sEl = document.getElementById("input_start_date");
        const eEl = document.getElementById("input_end_date");
        if (sEl && /^\d{4}-\d{2}-\d{2}$/.test(sEl.value))
          sEl.value = isoToUI(sEl.value);
        if (eEl && /^\d{4}-\d{2}-\d{2}$/.test(eEl.value))
          eEl.value = isoToUI(eEl.value);
      })();

      // ----- Select2 -----
      $(".select2").select2({
        width: "100%",
        allowClear: true,
        placeholder: "",
      });

      // ====== anti-boucle clear ======
      let isClearing = false;
      function safeClear($el) {
        isClearing = true;
        $el.val(null).trigger("change");
        isClearing = false;
      }

      // ----- Cascade Région → District → Site -----
      $("#selectRegion").on("change", function () {
        if (isClearing) return;
        const selectedRegions = $(this).val();
        clearOtherLines("area");
        populateDistricts(selectedRegions);
        safeClear($("#selectSite"));
      });

      $("#selectDistrict").on("change", function () {
        if (isClearing) return;
        clearOtherLines("area");
        populateSites($(this).val());
      });

      $("#selectSite").on("change", function () {
        if (isClearing) return;
        clearOtherLines("area");
      });

      // Labo / Convoyeur
      $("#selectLab").on("change", function () {
        if (isClearing) return;
        if ($(this).val()) clearOtherLines("lab");
      });

      $("#selectRider").on("change", function () {
        if (isClearing) return;
        if ($(this).val()) clearOtherLines("rider");
      });

      function clearOtherLines(active) {
        if (active === "area") {
          safeClear($("#selectLab"));
          safeClear($("#selectRider"));
        } else if (active === "lab") {
          safeClear($("#selectRegion"));
          safeClear($("#selectDistrict"));
          safeClear($("#selectSite"));
          safeClear($("#selectRider"));
        } else if (active === "rider") {
          safeClear($("#selectRegion"));
          safeClear($("#selectDistrict"));
          safeClear($("#selectSite"));
          safeClear($("#selectLab"));
        }
      }

      // Chargements AJAX
      function populateDistricts(selectedRegions) {
        $.get(
          "district/names_by_regions",
          { regions: selectedRegions || "" },
          function (districts) {
            const $d = $("#selectDistrict");
            isClearing = true;
            $d.empty().append('<option value=""></option>');
            $.each(districts, (_, x) =>
              $d.append(`<option value="${x.id}">${x.name}</option>`),
            );
            $d.val(null).trigger("change");
            isClearing = false;
          },
        );
      }
      function populateSites(selectedDistricts) {
        $.get(
          "site/names_by_districts",
          { districts: selectedDistricts || "" },
          function (sites) {
            const $s = $("#selectSite");
            isClearing = true;
            $s.empty().append('<option value=""></option>');
            $.each(sites, (_, x) =>
              $s.append(`<option value="${x.id}">${x.name}</option>`),
            );
            $s.val(null).trigger("change");
            isClearing = false;
          },
        );
      }

      // Utils dates
      function pad(n) {
        return (n < 10 ? "0" : "") + n;
      }
      function uiToISO(dmy) {
        if (!dmy) return "";
        const p = dmy.split(/[\/\-\.]/);
        if (p.length < 3) return "";
        const dd = parseInt(p[0], 10),
          mm = parseInt(p[1], 10),
          yyyy = parseInt(p[2].length === 2 ? "20" + p[2] : p[2], 10);
        if (!dd || !mm || !yyyy) return "";
        return `${yyyy}-${pad(mm)}-${pad(dd)}`;
      }

      // ----- URL d’impression (compat contrôleur) -----
      function buildReportUrl() {
        const startISO = uiToISO($("#input_start_date").val() || "");
        const endISO = uiToISO($("#input_end_date").val() || "");
        if (!startISO) {
          alert("Vous devez définir la période de départ !");
          return;
        }
        if (!endISO) {
          alert("Vous devez définir la période de fin !");
          return;
        }

        const region = $("#selectRegion").val();
        const district = $("#selectDistrict").val();
        const lab = $("#selectLab").val();
        const rider = $("#selectRider").val();

        // on choisit la portée unique selon ta logique serveur
        const url = new URL("/report/print", window.location.origin);
        if (startISO) url.searchParams.set("start", startISO);
        if (endISO) url.searchParams.set("end", endISO);
        if (rider) url.searchParams.set("rider", rider);
        else if (lab) url.searchParams.set("lab", lab);
        else if (district) url.searchParams.set("district", district);
        else if (region) url.searchParams.set("region", region);

        if (![rider, lab, district, region].some(Boolean)) {
          alert(
            "Veuillez sélectionner une Région/District, un Laboratoire ou un Convoyeur.",
          );
          return null;
        }
        return url.toString();
      }

      $("#printActivityReport").on("click", function (e) {
        e.preventDefault();
        const url = buildReportUrl();
        if (url) window.open(url, "_blank");
      });

      // Focus sur la recherche Select2 à l’ouverture
      $(document).on("select2:open", () => {
        const el = document.querySelector(".select2-search__field");
        if (el) el.focus();
      });
    </script>
  </body>
</html>
