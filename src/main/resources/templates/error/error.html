<!DOCTYPE html>
<html lang="fr" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: head}">
<title>Erreur – LSTracker</title>
</head>

<body class="sb-nav-fixed" style="background: #f1f5f9;">
	<div class="d-flex align-items-center justify-content-center" style="min-height: 100vh; padding: 1.5rem;">
		<div class="card shadow-sm border-0" style="max-width: 560px; width: 100%; border-radius: 1rem;">
			<div class="card-body p-4 p-md-5 text-center">

				<a th:href="@{/}" class="d-inline-flex align-items-center gap-2 text-decoration-none mb-4">
					<img th:src="@{/img/logo-sm.jpg}" alt="Logo LSTracker" style="height: 40px; border-radius: 6px;"/>
					<span style="font-weight: 700; font-size: 1.25rem; color: #1e293b;">LSTracker</span>
				</a>

				<div style="font-size: 4rem; line-height: 1; color: #f59e0b;">
					<i class="fas fa-exclamation-triangle"></i>
				</div>

				<h1 class="mt-3 mb-1" style="font-size: 1.8rem; font-weight: 700; color: #1e293b;"
					th:text="${status} ?: 'Erreur'">Erreur</h1>
				<h2 class="h6 text-muted" th:text="${error} ?: 'Une erreur est survenue'">Une erreur est survenue</h2>
				<p class="text-muted mt-2 mb-0">
					Une erreur inattendue s'est produite. Si le problème persiste,
					contactez l'administrateur.
				</p>

				<div class="d-flex gap-2 justify-content-center mt-4 flex-wrap">
					<a th:href="@{/}" class="btn btn-primary px-4">
						<i class="fas fa-home me-1"></i> Accueil
					</a>
					<a href="javascript:history.back()" class="btn btn-outline-secondary px-4">
						<i class="fas fa-arrow-left me-1"></i> Page précédente
					</a>
				</div>

			</div>
		</div>
	</div>
</body>
</html>
